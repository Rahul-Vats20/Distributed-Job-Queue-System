version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobqueue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jq_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: jq_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: jobuser
      RABBITMQ_DEFAULT_PASS: jobpassword
      RABBITMQ_DEFAULT_VHOST: jobqueue
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ─── API Server ────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: jq_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://jobuser:jobpassword@postgres:5432/jobqueue
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://jobuser:jobpassword@rabbitmq:5672/jobqueue
      JWT_SECRET: super-secret-jwt-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Workers (scaled) ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://jobuser:jobpassword@postgres:5432/jobqueue
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://jobuser:jobpassword@rabbitmq:5672/jobqueue
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 3

  # ─── Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: jq_dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

  # ─── Nginx (reverse proxy) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: jq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: job_queue_network
