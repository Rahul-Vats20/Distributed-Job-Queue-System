version: '3.9'
services:
  api:
    build:
      context: ./api
    command: npx nodemon src/server.js
    environment:
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src
      - ./shared:/app/shared

  worker:
    command: npx nodemon src/worker.js
    environment:
      NODE_ENV: development
      WORKER_CONCURRENCY: 3
    volumes:
      - ./worker/src:/app/src
      - ./shared:/app/shared
